        <div class="container">

                <div class="col-12 col-lg-6">
                    <div class="contact-content mb-100">

                        <!-- Logo -->
                        <a href="#" class="d-block mb-50"><strong>TNSchemes<span style="color:#FF0000">Bot</span></strong></a>

                       

                      


                        <!-- Contact Form Area -->
                        <div class="contact-form-area mb-70">
                            <h4 class="mb-50" id="scheme-title">Loading scheme...</h4>
							<div id="form-msg" style="margin-bottom:12px"></div>

							
                            <form id="schemeForm" action="#" method="post">
                                <input type="hidden" name="sid" id="hiddenSid">
                                <div class="row">
								
									
                                    <div class="col-lg-12">
                                        <div class="form-group">
											<label>Query / Description</label>
                                            <textarea class="form-control" name="user_query" id="f_user_query"></textarea>
                                        </div>
                                    </div>
									<div class="col-lg-12">
                                        <div class="form-group">
											<label>Document Requirements</label>
                                            <input type="text" class="form-control" name="scheme_req" id="f_scheme_req">
                                        </div>
                                    </div>
									<div class="col-lg-12">
                                        <div class="form-group">
											<label>District</label>
                                            <input type="text" class="form-control" name="district" id="f_district">
                                        </div>
                                    </div>
									<div class="col-lg-12">
                                        <div class="form-group">
											<label>Contact Person</label>
                                            <input type="text" class="form-control" name="name" id="f_name">
                                        </div>
                                    </div>
									<div class="col-lg-12">
                                        <div class="form-group">
											<label>Designation</label>
                                            <input type="text" class="form-control" name="designation" id="f_designation">
                                        </div>
                                    </div>
									<div class="col-lg-12">
                                        <div class="form-group">
											<label>Address</label>
                                            <input type="text" class="form-control" name="address" id="f_address">
                                        </div>
                                    </div>
									<div class="col-lg-12">
                                        <div class="form-group">
											<label>Mobile No.</label>
                                            <input type="text" class="form-control" name="mobile" maxlength="10" id="f_mobile">
                                        </div>
                                    </div>
									<div class="col-lg-12">
                                        <div class="form-group">
											<label>Link</label>
                                            <input type="text" class="form-control" name="url_link" id="f_url_link">
                                        </div>
                                    </div>
									
									
                                    <div class="col-12">
                                        <button class="btn newsbox-btn mt-30" type="submit" id="saveBtn">Save</button>
                                        <a href="add_query.html" class="btn mt-30" style="margin-left:10px">← Back</a>
                                    </div>
                                </div>
                            </form>
                            <script>
                            var sid = new URLSearchParams(window.location.search).get('sid');
                            if (!sid) {
                                document.getElementById('scheme-title').textContent = 'No scheme selected';
                                document.getElementById('form-msg').innerHTML = '<span style="color:red">No scheme ID. <a href="add_query.html">Go back.</a></span>';
                            } else {
                                document.getElementById('hiddenSid').value = sid;
                                fetch('http://localhost:5000/add_query1?sid=' + sid, { method: 'GET', credentials: 'include' })
                                .then(function(r){ return r.json(); })
                                .then(function(resp){
                                    var d = resp.data; var row = d.data;
                                    if (!row) { document.getElementById('scheme-title').textContent = 'Scheme not found'; return; }
                                    document.getElementById('scheme-title').textContent = row[1] || 'Scheme Details';
                                    document.getElementById('f_user_query').value  = row[5]  || '';
                                    document.getElementById('f_scheme_req').value  = row[12] || '';
                                    document.getElementById('f_district').value    = row[6]  || '';
                                    document.getElementById('f_name').value        = row[7]  || '';
                                    document.getElementById('f_designation').value = row[9]  || '';
                                    document.getElementById('f_address').value     = row[10] || '';
                                    document.getElementById('f_mobile').value      = row[8]  || '';
                                    document.getElementById('f_url_link').value    = row[11] || '';
                                    var data2 = d.data2 || []; var tbody = document.getElementById('contactsBody');
                                    tbody.innerHTML = data2.length === 0 ? '<tr><td colspan="8" style="text-align:center;color:#888">No contacts yet</td></tr>' : '';
                                    data2.forEach(function(c){
                                        tbody.innerHTML += '<tr><td>'+(c[0]||'')+'</td><td>'+(c[2]||'')+'</td><td>'+(c[3]||'')+'</td><td>'+(c[5]||'')+'</td><td>'+(c[6]||'')+'</td><td>'+(c[4]||'')+'</td><td>'+(c[7]||'')+'</td><td><a href="add_query1.html?sid='+sid+'&act=del&did='+c[0]+'">Delete</a></td></tr>';
                                    });
                                }).catch(function(){ document.getElementById('form-msg').innerHTML='<span style="color:red">Could not load data. Is Flask running at localhost:5000?</span>'; });
                                document.getElementById('schemeForm').addEventListener('submit', function(e){
                                    e.preventDefault();
                                    document.getElementById('form-msg').innerHTML = '<span style="color:#555">Saving...</span>';
                                    document.getElementById('saveBtn').disabled = true;
                                    fetch('http://localhost:5000/add_query1?sid='+sid, { method:'POST', body: new FormData(this), credentials:'include' })
                                    .then(function(r){ return r.json(); })
                                    .then(function(data){ document.getElementById('form-msg').innerHTML='<span style="color:#006600">Saved successfully!</span>'; document.getElementById('saveBtn').disabled=false; })
                                    .catch(function(){ document.getElementById('form-msg').innerHTML='<span style="color:red">Save failed.</span>'; document.getElementById('saveBtn').disabled=false; });
                                });
                            }
                            </script>
                        </div>

						   <thead><tr>
						   <td>#</td><td>District</td><td>Name</td><td>Designation</td>
						   <td>Address</td><td>Mobile No.</td><td>Link</td><td>Action</td>
						   </tr></thead>
						   <tbody id="contactsBody"><tr><td colspan="8" style="text-align:center;color:#888">Loading...</td></tr></tbody>
						   </table>
                        </div>
