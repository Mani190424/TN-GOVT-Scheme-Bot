    <section class="contact-area section-padding-100">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-6">
            <div class="contact-content mb-100">
              <!-- Logo -->
              <a href="#" class="d-block mb-50"
                ><strong
                  >TNSchemes<span style="color: #ff0000">Bot</span></strong
                ></a
              >

              <!-- Contact Form Area -->
              <div class="contact-form-area mb-70">
                <h4 class="mb-50">Training Phase</h4>

                <div id="upload-msg"></div>

                <form id="csvUploadForm" enctype="multipart/form-data">
                  <div class="row">
                    <div class="col-lg-12">
                      <div class="form-group">
                        <label>Select Dataset File</label>
                        <input
                          type="file"
                          class="form-control"
                          name="file"
                          placeholder=""
                          id="csvFileInput"
                          accept=".csv"
                        />
                      </div>
                    </div>

                    <div class="col-12">
                      <button
                        class="btn newsbox-btn mt-30"
                        type="submit"
                        id="uploadBtn"
                      >
                        Upload
                      </button>
                    </div>
                  </div>
                </form>
                <script>
                  document
                    .getElementById("csvUploadForm")
                    .addEventListener("submit", function (e) {
                      e.preventDefault();
                      var fileInput = document.getElementById("csvFileInput");
                      if (!fileInput.files[0]) {
                        document.getElementById("upload-msg").innerHTML =
                          '<span style="color:red">Please select a CSV file first.</span>';
                        return;
                      }
                      var formData = new FormData();
                      formData.append("file", fileInput.files[0]);
                      document.getElementById("upload-msg").innerHTML =
                        '<span style="color:#555">Uploading...</span>';
                      document.getElementById("uploadBtn").disabled = true;
                      fetch("http://localhost:3000/admin", {
                        method: "POST",
                        body: formData,
                        credentials: "include",
                      })
                        .then(function (res) {
                          return res.json();
                        })
                        .then(function (data) {
                          document.getElementById("upload-msg").innerHTML =
                            '<span style="color:#006600">Dataset uploaded successfully! Redirecting...</span>';
                          setTimeout(function () {
                            window.location.href = "process.html";
                          }, 2000);
                        })
                        .catch(function (err) {
                          document.getElementById("upload-msg").innerHTML =
                            '<span style="color:red">Upload failed. Make sure the backend is running at localhost:3000.</span>';
                          document.getElementById("uploadBtn").disabled = false;
                        });
                    });
                </script>
              </div>

            </div>
